name: Daily Risk Regime Report

on:
  schedule:
    # 평일 매일 07:00 KST = 22:00 UTC (전날 일~목)
    # KST 월~금 07:00 → UTC 일~목 22:00
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Risk Regime Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: "Asia/Seoul"
        run: python main.py

      - name: Commit updated report & history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update risk regime report $(date +%Y-%m-%d)"
            git push
          fi

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "❌ Risk Regime Monitor failed. Check Actions logs.",
              },
              timeout=10,
          )
          EOF
