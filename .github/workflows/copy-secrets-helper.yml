name: '[helper] Copy Telegram Secrets to leading-stocks-calendar'

# 일회성 시크릿 복사 워크플로우
# 실행 후 즉시 파일 삭제 예정

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo name (without owner)'
        required: true
        default: 'leading-stocks-calendar'
      confirm:
        description: 'Type "yes" to confirm secret copy'
        required: true
        default: 'no'

permissions:
  contents: read

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyNaCl
        run: pip install pynacl

      - name: Copy secrets to target repo
        env:
          SOURCE_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SOURCE_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          OWNER: jinhae8971
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
        run: |
          python <<'PYEOF'
          import os, json, base64, urllib.request, urllib.error, sys
          from nacl import encoding, public

          PAT = os.environ["GH_PAT"]
          OWNER = os.environ["OWNER"]
          TARGET = os.environ["TARGET_REPO"]
          REPO = f"{OWNER}/{TARGET}"

          secrets_to_copy = {
              "TELEGRAM_TOKEN": os.environ["SOURCE_TELEGRAM_TOKEN"],
              "TELEGRAM_CHAT_ID": os.environ["SOURCE_TELEGRAM_CHAT_ID"],
          }

          # 1. 공개키 조회
          req = urllib.request.Request(
              f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
              headers={
                  "Authorization": f"token {PAT}",
                  "Accept": "application/vnd.github.v3+json",
              },
          )
          try:
              with urllib.request.urlopen(req) as r:
                  pk = json.loads(r.read())
              print(f"[OK] Public key fetched: key_id={pk['key_id']}")
          except urllib.error.HTTPError as e:
              print(f"[FAIL] Cannot fetch public key: {e.code} {e.reason}")
              print(e.read().decode())
              sys.exit(1)

          # 2. 각 시크릿 암호화 후 등록
          public_key = public.PublicKey(pk["key"].encode("utf-8"),
                                         encoding.Base64Encoder())
          sealed_box = public.SealedBox(public_key)

          for name, value in secrets_to_copy.items():
              if not value:
                  print(f"[SKIP] {name}: source value empty")
                  continue
              encrypted = sealed_box.encrypt(value.encode("utf-8"))
              encrypted_b64 = base64.b64encode(encrypted).decode("utf-8")

              data = json.dumps({
                  "encrypted_value": encrypted_b64,
                  "key_id": pk["key_id"],
              }).encode()

              req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/{name}",
                  data=data,
                  headers={
                      "Authorization": f"token {PAT}",
                      "Accept": "application/vnd.github.v3+json",
                  },
                  method="PUT",
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      status = r.status
                  action = "Created" if status == 201 else "Updated"
                  print(f"[OK] {action} {name} on {REPO} (HTTP {status})")
              except urllib.error.HTTPError as e:
                  print(f"[FAIL] {name}: HTTP {e.code} {e.reason}")
                  print(e.read().decode())

          print("\n[DONE] Secret copy complete. Remember to DELETE this workflow file.")
          PYEOF

      - name: Reminder
        run: |
          echo "::warning::Helper workflow executed. DELETE .github/workflows/copy-secrets-helper.yml NOW."
